# Minimal example: run the published ArrJanitor image as a daemon.
#
# The image's default CMD runs ArrJanitor in daemon mode, passing the paths
# explicitly: `--config /config/config.yml --database /data/arr_janitor.db
# --daemon`. So the SQLite database is written to the mounted /data volume and
# persists across container restarts with no config changes needed — just mount
# your config read-only and a writable data volume.
#
# PUID/PGID: the container's entrypoint chowns /data to these and runs the app as
# that user, so the bind-mounted ./data works even when `docker compose up`
# created it root-owned. Set them to your host user (`id -u` / `id -g`) so the DB
# files are owned by you; they default to 1000:1000.
services:
  arr-janitor:
    image: ghcr.io/mjblack/arr_janitor:latest
    restart: unless-stopped
    volumes:
      - ./config.yml:/config/config.yml:ro
      - ./data:/data
    environment:
      # Number of Crystal (-Dpreview_mt) worker threads.
      - CRYSTAL_WORKERS=4
      # Log verbosity: trace|debug|info|notice|warn|error|fatal|none (default info).
      # - ARR_JANITOR_LOG_LEVEL=info
      # Match your host user so ./data stays writable and DB files are yours.
      - PUID=1000
      - PGID=1000
