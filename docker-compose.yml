# Minimal example: run the published ArrJanitor image as a daemon.
#
# The image's default CMD runs ArrJanitor in daemon mode, passing the paths
# explicitly: `--config /config/config.yml --database /data/arr_janitor.db
# --daemon`. So the SQLite database is written to the mounted /data volume and
# persists across container restarts with no config changes needed — just mount
# your config read-only and a writable data volume.
services:
  arr-janitor:
    image: ghcr.io/mjblack/arr_janitor:latest
    restart: unless-stopped
    volumes:
      - ./config.yml:/config/config.yml:ro
      - ./data:/data
    environment:
      # Number of Crystal (-Dpreview_mt) worker threads.
      - CRYSTAL_WORKERS=4
