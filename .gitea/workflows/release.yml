# Gitea Actions release workflow for ArrJanitor.
#
# Requirements:
#   1. A registered Gitea Actions runner able to pick up `ubuntu-latest` jobs.
#   2. A repository secret `GH_TOKEN` — a GitHub token with *read* access to the
#      private dependency repos `mjblack/sonarr` and `mjblack/qbittorrent.cr`
#      (used by `shards install` in the test job and passed as a BuildKit secret
#      to the image build). [in place]
#   3. Registry push to `gitscm.mjbh.net`: the built-in `GITHUB_TOKEN` needs
#      `package:write` (else define a `REGISTRY_TOKEN` secret and substitute it).
#      NOTE: because the registry uses the internal CA (mjbh-JINX-CA), the
#      runner's Docker daemon must also trust that CA (or list gitscm.mjbh.net as
#      an insecure registry in /etc/docker/daemon.json) for the image push to
#      succeed — that is host/daemon config, not settable from this workflow.
#
# TLS: git and curl calls to the Gitea server skip verification
# (GIT_SSL_NO_VERIFY / curl -k) because the internal CA is not trusted by the
# job containers. Runner is on a trusted internal network.
#
# Release model mirrors the sonarr repo: this workflow is triggered MANUALLY
# (workflow_dispatch). It does NOT trigger on tag push — the workflow itself
# creates the `v<version>` tag and the Gitea release after CI passes.
#
# Crystal is pinned to 1.20.2 on purpose: the dev dependency ameba 1.6.4 does not
# build on newer Crystal releases.

name: Release

on:
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------------
  # CI gate: replicates ci.yml. The release job only runs if this passes.
  # --------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    # Runs inside the official Crystal 1.20.2 image (Crystal + shards present),
    # avoiding the install-crystal action's flaky GitHub API lookup. Pins 1.20.2.
    container:
      image: crystallang/crystal:1.20.2
    env:
      GIT_SSL_NO_VERIFY: "true"  # internal CA not trusted by job container
      TZ: "UTC"                  # valid zoneinfo name for Crystal Time.local
    steps:
      # The Crystal image has no Node.js, so JS-based actions/checkout can't run
      # here — check out manually with git (GIT_SSL_NO_VERIFY handles the CA).
      - name: Checkout
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config --global --add safe.directory '*'
          host="${GITHUB_SERVER_URL#https://}"
          git init -q
          git remote add origin "https://${GITEA_TOKEN}@${host}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}" || git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout -q --detach FETCH_HEAD

      # crystal-sqlite3 links against libsqlite3 and needs its dev headers;
      # tzdata for Crystal's Time.local; ca-certificates for GitHub shards clones.
      - name: Install system libraries
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libsqlite3-dev tzdata ca-certificates

      # Route GitHub HTTPS clones through the GH_TOKEN secret so `shards install`
      # can fetch the private sonarr / qbittorrent.cr dependencies.
      - name: Configure private dependency access
        run: |
          git config --global \
            url."https://${{ secrets.GH_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"

      - name: Install dependencies
        run: shards install

      - name: Check formatting
        run: crystal tool format --check

      - name: Lint
        run: bin/ameba

      - name: Build
        run: crystal build -Dpreview_mt src/main.cr -o bin/arr_janitor

      - name: Run specs
        run: crystal spec

  # --------------------------------------------------------------------------
  # Release: version check → build+push image → tag + Gitea release.
  # Runs only after the CI gate (`test`) succeeds.
  # --------------------------------------------------------------------------
  release:
    needs: test
    runs-on: ubuntu-latest
    env:
      GIT_SSL_NO_VERIFY: "true"  # internal CA not trusted by job container
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The version lives in two places that must always agree: `version:` in
      # shard.yml and `ArrJanitor::VERSION` in src/arr_janitor.cr. Fail loudly on
      # any mismatch; otherwise export it as VERSION for later steps.
      - name: Verify version consistency
        run: |
          set -euo pipefail
          shard_version="$(sed -n 's/^version:[[:space:]]*//p' shard.yml | head -n1 | tr -d '"'"'"' ')"
          src_version="$(sed -n 's/.*VERSION[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' src/arr_janitor.cr | head -n1)"
          echo "shard.yml version:        '${shard_version}'"
          echo "ArrJanitor::VERSION:      '${src_version}'"
          if [ -z "${shard_version}" ] || [ -z "${src_version}" ]; then
            echo "::error::could not read version from shard.yml and/or src/arr_janitor.cr"
            exit 1
          fi
          if [ "${shard_version}" != "${src_version}" ]; then
            echo "::error::version mismatch: shard.yml=${shard_version} vs ArrJanitor::VERSION=${src_version}"
            exit 1
          fi
          echo "VERSION=${shard_version}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to the Gitea container registry. The built-in GITHUB_TOKEN needs
      # package:write; substitute `secrets.REGISTRY_TOKEN` here if it does not.
      # Fallback if docker/login-action is unavailable on the runner:
      #   echo "${{ secrets.GITHUB_TOKEN }}" | docker login gitscm.mjbh.net \
      #     -u "${{ github.actor }}" --password-stdin
      - name: Log in to Gitea container registry
        uses: docker/login-action@v3
        with:
          registry: gitscm.mjbh.net
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the image and push :<version> and :latest. GH_TOKEN is passed as a
      # BuildKit secret (secret-id `ghtoken`, matching the Dockerfile mount) so
      # `shards install --production` can fetch the private deps. -Dpreview_mt is
      # baked into the Dockerfile's build command.
      #
      # Fallback if docker/build-push-action is unavailable on the runner:
      #   DOCKER_BUILDKIT=1 docker build \
      #     --secret id=ghtoken,env=GH_TOKEN \
      #     -t gitscm.mjbh.net/mblack/arr_janitor:${VERSION} \
      #     -t gitscm.mjbh.net/mblack/arr_janitor:latest .
      #   docker push gitscm.mjbh.net/mblack/arr_janitor:${VERSION}
      #   docker push gitscm.mjbh.net/mblack/arr_janitor:latest
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            gitscm.mjbh.net/mblack/arr_janitor:${{ env.VERSION }}
            gitscm.mjbh.net/mblack/arr_janitor:latest
          secrets: |
            ghtoken=${{ secrets.GH_TOKEN }}

      # Create the tag and a Gitea release with generated notes via the Gitea
      # REST API (self-contained; does not assume `tea` is on the runner). Uses
      # the built-in GITHUB_TOKEN, which on Gitea Actions authenticates to the
      # instance API — it needs repo write (contents) to create tags/releases.
      # The Gitea server URL and repo come from the Actions context.
      - name: Create tag and Gitea release
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          api="${GITHUB_SERVER_URL:-https://gitscm.mjbh.net}/api/v1/repos/${GITHUB_REPOSITORY}/releases"
          echo "Creating release v${VERSION} at ${api}"
          # target_commitish + a non-existent tag_name makes Gitea create the tag
          # from the checked-out commit; generate_release_notes fills the body.
          # -k: the Gitea server uses the internal CA (mjbh-JINX-CA) that the job
          # container does not trust; the runner is on a trusted internal network.
          http_code="$(curl -sSk -o /tmp/release_response.json -w '%{http_code}' \
            -X POST "${api}" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"v${VERSION}\",
              \"target_commitish\": \"${GITHUB_SHA}\",
              \"name\": \"v${VERSION}\",
              \"generate_release_notes\": true
            }")"
          echo "HTTP ${http_code}"
          cat /tmp/release_response.json || true
          case "${http_code}" in
            2*) echo "Release v${VERSION} created." ;;
            *) echo "::error::Gitea release creation failed (HTTP ${http_code})"; exit 1 ;;
          esac
