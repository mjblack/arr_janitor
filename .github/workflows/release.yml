name: Release

# Manually triggered. Runs the CI gate, then verifies the version in shard.yml
# and src/arr_janitor.cr agree, builds and pushes the container image to GHCR
# (ghcr.io/mjblack/arr_janitor:<version> and :latest), and creates the
# v<version> tag + a GitHub release with generated notes.
#
# Both runtime dependencies are public, so no dependency token is needed — not
# for `shards install` and not for the image build.
#
# Crystal is pinned to 1.20.2: the dev dependency ameba 1.6.4 does not build on
# newer (>1.20.x) Crystal releases.
on:
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

jobs:
  # --------------------------------------------------------------------------
  # CI gate: replicates ci.yml. The release job only runs if this passes.
  # --------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libsqlite3-dev

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: "1.20.2"

      - name: Install dependencies
        run: shards install

      - name: Check formatting
        run: crystal tool format --check

      - name: Lint (ameba)
        run: bin/ameba

      - name: Build
        run: crystal build -Dpreview_mt src/main.cr -o bin/arr_janitor

      - name: Run specs
        run: crystal spec

  # --------------------------------------------------------------------------
  # Release: version check → build+push image to GHCR → tag + GitHub release.
  # Runs only after the CI gate (`test`) succeeds.
  # --------------------------------------------------------------------------
  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The version lives in two places that must always agree: `version:` in
      # shard.yml and `ArrJanitor::VERSION` in src/arr_janitor.cr. Fail loudly on
      # any mismatch; otherwise export it as VERSION for later steps.
      - name: Verify version consistency
        run: |
          set -euo pipefail
          shard_version="$(sed -n 's/^version:[[:space:]]*//p' shard.yml | head -n1 | tr -d '"'"'"' ')"
          src_version="$(sed -n 's/.*VERSION[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' src/arr_janitor.cr | head -n1)"
          echo "shard.yml version:        '${shard_version}'"
          echo "ArrJanitor::VERSION:      '${src_version}'"
          if [ -z "${shard_version}" ] || [ -z "${src_version}" ]; then
            echo "::error::could not read version from shard.yml and/or src/arr_janitor.cr"
            exit 1
          fi
          if [ "${shard_version}" != "${src_version}" ]; then
            echo "::error::version mismatch: shard.yml=${shard_version} vs ArrJanitor::VERSION=${src_version}"
            exit 1
          fi
          echo "VERSION=${shard_version}" >> "$GITHUB_ENV"

      # --- Build the release binary and native packages (.deb + .rpm) --------
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libsqlite3-dev

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: "1.20.2"

      - name: Install dependencies
        run: shards install

      - name: Build release binary
        run: crystal build -Dpreview_mt --release src/main.cr -o bin/arr_janitor

      - name: Install nfpm
        env:
          NFPM_VERSION: "2.43.0"
        run: |
          set -euo pipefail
          curl -sSLo /tmp/nfpm.deb \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_amd64.deb"
          sudo dpkg -i /tmp/nfpm.deb
          nfpm --version

      - name: Build .deb and .rpm packages
        run: |
          set -euo pipefail
          mkdir -p dist
          nfpm package --config packaging/nfpm.yaml --packager deb --target dist/
          nfpm package --config packaging/nfpm.yaml --packager rpm --target dist/
          echo "Produced packages:"
          ls -l dist/
          # Capture the exact filenames for the release step.
          {
            echo "DEB_PKG=$(ls dist/*.deb)"
            echo "RPM_PKG=$(ls dist/*.rpm)"
          } >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Both deps are public, so the build needs no BuildKit secret.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/mjblack/arr_janitor:${{ env.VERSION }}
            ghcr.io/mjblack/arr_janitor:latest

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes \
            "${DEB_PKG}" "${RPM_PKG}"
